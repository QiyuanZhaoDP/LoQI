# Phase 1/2 foundation-model training — WARM-START flavor.
#
# Matches the architecture of scripts/conf/loqi/loqi.yaml (256-dim,
# 10 layers, 4 heads, ~20M backbone) so we can resume from the
# existing data/loqi.ckpt. Only the newly added thermo heads get
# random init; every other weight is warm-started from the pretrained
# denoising checkpoint.
#
# This is the fast path: ~1 day of fine-tuning on 4 GPUs vs 3-5 days
# from-scratch for loqi_thermo_cold.yaml.
#
# Prereqs:
#   - data_processing/build_property_table.py has produced
#     data/property_table.parquet (thermo + RDKit descriptors per canonical SMILES)
#   - data/loqi.ckpt exists (your Phase 0 backbone)

run_name: 'loqi_thermo_warm'
outdir: null
resume: data/loqi.ckpt        # warm-start here — train.py loads with strict=False
ema: True

wandb_params:
  mode: 'online'
  group: 'foundation-warm'
  project: 'thermogen'

data:
  dataset_root: "data/chembl3d_stereo"
  processed_folder: "processed"
  data_suffix: "_h"                 # original geometry files (no _h_thermo)
  property_table: "data/property_table.parquet"
  batch_size: &batch_size 150
  inference_batch_size: 150
  removed_h: False
  data_loader_type: "midi"
  aug_rotations: False
  scale_coords: &scale_coords 1.0
  num_workers: 8                    # per-rank DataLoader workers

loss:
  variables:
    - variable_name: 'x'
      loss_scale: 3.0
      aggregate: 'mean'
      continuous: True
      use_distance: null
      distance_scale: null

interpolant:
  timesteps: &timesteps 25
  time_type: &time_type "discrete"
  scheduler_type: &scheduler_type "cosine_adaptive"
  sample_time_method: "uniform"
  sample_time_mean: 0
  sample_time_scale: 0.81
  global_variable_name: 'x'
  min_t: &min_t 0
  variables:
    - variable_name: 'x'
      interpolant_type: 'continuous_diffusion'
      diffusion_type: 'vdm'
      prior_type: 'gaussian'
      timesteps: *timesteps
      num_classes: 3
      scheduler_type: *scheduler_type
      scheduler_cut: False
      time_type: *time_type
      nu: 2.5
      com_free: True
      min_t: *min_t
    - variable_name: 'h'
      interpolant_type: "discrete_null"
      num_classes: &num_atoms 17
      prior_type: null
    - variable_name: 'edge_attr'
      interpolant_type: "discrete_null"
      num_classes: 9
      prior_type: null
    - variable_name: 'charges'
      interpolant_type: "discrete_null"
      concat: 'h'
      num_classes: 6
      offset: 2
      prior_type: null

# ==== Same backbone as loqi.yaml — so loqi.ckpt loads cleanly ===============
dynamics:
  model_name: "megav3conf"
  model_args:
    atom_classes: 23
    edge_classes: 9
    invariant_edge_feat_dim: 64
    invariant_node_feat_dim: 256
    n_vector_features: 64
    equivariant_node_feature_dim: 3
    num_layers: 10
    num_heads: 4
    dist_size: 16
    prune_edges: False
    # Thermo head — new weights, will random-init and train from scratch.
    thermo_head_args:
      n_mp_layers: 2
      mp_n_heads:  4
      hidden:      256
    # RDKit 9-descriptor head (100% label coverage). Lighter than thermo
    # since the targets are cheap to hit. Acts as a regularizer on the
    # global mol representation.
    rdkit_head_args:
      n_mp_layers: 1
      mp_n_heads:  4
      hidden:      128
  wrapper_args:
    timesteps: *timesteps
    time_type: *time_type

self_conditioning:
  name: "base"
  variables:
    - variable_name: x
      hidden_dims: 32
      fuse_softmax: False
      vector: True
      clamp_min: -100
      clamp_max: 100

sample:
  node_distribution: "${data.dataset_root}/processed/train_n_h.pickle"

# ==== Phase 2 auxiliary thermo loss =========================================
# Stats from data/property_table.parquet after screen_thermo_outliers.py
# (n=652,567 labeled). Rerun compute_rdkit_stats.py if the parquet changes.
# Order: [H298, G298, Cv, S°, H0].
thermo_loss:
  min_time: 0.8
  weight:   0.05
  target_mean: [-317.36, 111.66, 390.86, 676.34, -119.10]
  target_std:  [ 346.40, 344.07,  98.00, 160.56,  364.45]

# ==== RDKit descriptor auxiliary loss =======================================
# Stats from full property_table.parquet (n=1,849,214, 100% coverage).
# Smaller weight than thermo — regularizer, not primary objective.
# Order: [logp, tpsa, n_h_donors, n_h_acceptors, n_rot_bonds,
#         frac_csp3, n_aliph_rings, qed, labute_asa]
rdkit_loss:
  min_time: 0.8
  weight:   0.02
  target_mean: [3.0455, 77.0193, 1.4421, 4.9728, 5.2942, 0.3220, 0.9307, 0.5899, 161.6316]
  target_std:  [1.7329, 31.3564, 1.1131, 2.0423, 2.5879, 0.1930, 0.9768, 0.2033,  41.1187]

train:
  seed: 42
  gpus: 4
  # Note: with n_gpus > 1, each rank iterates the FULL dataset independently
  # (MiDiDataloader bypasses Lightning's DistributedSampler auto-inject) — so
  # one "epoch" here is effectively n_gpus × full-dataset passes. 50 epochs
  # on 4 GPUs ≈ 200 single-GPU-epoch equivalent data exposure.
  n_epochs: 50              # fine-tune from a converged ckpt — fewer epochs
  enable_progress_bar: True
  gradient_clip_value: 1.0
  log_freq: 50
  val_freq: 2
  checkpoint_monitor: opt_median_relative_energy
  checkpoint_monitor_mode: min
  checkpoint_every_n_train_steps: 500
  resume_strict: False      # allow missing thermo-head keys in the ckpt

evaluation:
  type: conformers
  max_molecules: 300
  timesteps: *timesteps
  compute_3D_metrics: True
  compute_energy_metrics: True
  compute_stereo_metrics: True
  scale_coords: *scale_coords
  energy_metrics_args:
    model_path: src/megalodon/metrics/aimnet2/cpcm_model/wb97m_cpcms_v2_0.jpt
    batchsize: 100
    opt_metrics: True
    opt_params:
      fmax: 2e-3
      max_nstep: 3000

optimizer:
  type: adamw
  lr: 5.e-5                 # lower than from-scratch: backbone is already fit
  weight_decay: 1.e-12
  amsgrad: True

# Linear warmup → linear decay. Constant LR was producing a noisy
# plateau (last-10-epoch x_loss σ ~0.013 around 0.25): optimizer kept
# stepping out of the minimum. Decay to 1% of peak over the run length.
# Step counts assume ~10k grad-steps/epoch (4-GPU DDP, no DistributedSampler).
lr_scheduler:
  type: linear_warmup_decay
  initial_lr: 1.e-7
  final_lr: 5.e-5             # peak LR after warmup
  num_warmup_steps: 2000      # gentle ramp protects pretrained weights
  milestone_steps: 2000       # decay starts here
  num_decay_steps: 498000     # ~50 epoch × 10k step − warmup
  min_lr_decay: 5.e-7         # 1% of peak — floor
  interval: step
  frequency: 1
