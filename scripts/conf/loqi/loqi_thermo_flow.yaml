# Phase 1 warm-start from a FLOW-MATCHING LoQI checkpoint.
#
# Matches scripts/conf/loqi/loqi_flow.yaml (256-dim / 10 layers / 4 heads,
# continuous flow matching with velocity prediction + rigid OT) so we can
# resume directly from data/loqi_flow.ckpt. Only the new thermo head is
# randomly initialized; every other weight is warm-started.
#
# Prereqs:
#   - data/property_table.parquet (from data_processing/build_property_table.py)
#   - data/loqi_flow.ckpt           (your flow-matching checkpoint)
#
# Launch:
#   python scripts/train.py --config-name=loqi_thermo_flow \
#       outdir=./outputs/loqi_thermo_flow train.gpus=4

run_name: 'loqi_thermo_flow_warm_v1'
outdir: null
resume: data/loqi_flow.ckpt        # warm-start here — train.py loads with strict=False
ema: True

wandb_params:
  mode: 'online'
  group: 'foundation-warm-flow'
  project: 'thermogen'

data:
  dataset_root: "data/chembl3d_stereo"
  processed_folder: "processed"
  data_suffix: "_h"                 # original geometry files
  property_table: "data/property_table.parquet"
  batch_size: &batch_size 150
  inference_batch_size: 150
  removed_h: False
  data_loader_type: "midi"
  aug_rotations: False
  scale_coords: &scale_coords 1.0
  num_workers: 8                    # per-rank DataLoader workers

loss:
  # Flow-matching training used loss clamps on the coord velocity; keep the
  # same knobs so the denoising objective is unchanged under warm-start.
  use_loss_clamps: True
  loss_clamp_epoch_threshold: 10
  loss_clamps:
    ts_coord: 1.0
  variables:
    - variable_name: 'x'
      loss_scale: 1.0
      aggregate: 'mean'
      continuous: True
      loss_type: 'mse'
      use_distance: null
      distance_scale: null

interpolant:
  timesteps: &timesteps 25
  time_type: &time_type "continuous"
  sample_time_method: "uniform"
  sample_time_mean: 0
  sample_time_scale: 1.0
  global_variable_name: 'x'
  min_t: &min_t 0.0
  variables:
    - variable_name: 'x'
      interpolant_type: 'continuous_flow_matching'
      prediction_type: 'velocity'
      optimal_transport: 'rigid'
      prior_type: 'gaussian'
      timesteps: *timesteps
      num_classes: 3
      scheduler_type: "linear"
      scheduler_cut: False
      time_type: *time_type
      min_t: *min_t
      com_free: True
      noise_sigma: 0.0
      inference_noise_sigma: 0.
    - variable_name: 'h'
      interpolant_type: "discrete_null"
      num_classes: &num_atoms 17
      prior_type: null
    - variable_name: 'edge_attr'
      interpolant_type: "discrete_null"
      num_classes: 9
      prior_type: null
    - variable_name: 'charges'
      interpolant_type: "discrete_null"
      concat: 'h'
      num_classes: 6
      offset: 2
      prior_type: null

# ==== Same backbone as loqi_flow.yaml — loqi_flow.ckpt loads cleanly ========
dynamics:
  model_name: "megav3conf"
  model_args:
    atom_classes: 23
    edge_classes: 9
    invariant_edge_feat_dim: 64
    invariant_node_feat_dim: 256
    n_vector_features: 64
    equivariant_node_feature_dim: 3
    num_layers: 10
    num_heads: 4
    dist_size: 16
    prune_edges: False
    # Thermo head — new weights, will random-init and train from scratch.
    thermo_head_args:
      n_mp_layers: 2
      mp_n_heads:  4
      hidden:      256
    # RDKit 9-descriptor head (100% label coverage). Lighter than thermo
    # since the targets are cheap to hit. Acts as a regularizer on the
    # global mol representation.
    rdkit_head_args:
      n_mp_layers: 1
      mp_n_heads:  4
      hidden:      128
  wrapper_args:
    timesteps: *timesteps
    time_type: *time_type

# NOTE: loqi_flow.yaml does NOT enable self_conditioning — the flow ckpt
# has no self-conditioning weights, so we omit that block here too.

sample:
  node_distribution: "${data.dataset_root}/processed/train_n_h.pickle"
  return_step_output: True

# ==== Phase 2 auxiliary thermo loss =========================================
# Stats computed from data/property_table.parquet (n=652,782 labeled mols)
# via data_processing/compute_rdkit_stats.py — rerun if the parquet changes.
# Order matches TARGET_FIELDS_DEFAULT: [H298, G298, Cv, S°, H0].
thermo_loss:
  min_time: 0.8
  weight:   0.05                 # scalar weight for the thermo MP head
  target_mean: [-317.86, 111.21, 390.90, 676.36, -119.61]
  target_std:  [ 348.03, 345.38,  98.06, 160.84,  366.04]

# ==== RDKit descriptor auxiliary loss =======================================
# Stats computed from property_table.parquet (n=1,849,214, 100% coverage).
# Smaller weight than thermo — cheap signal, more of a regularizer than a
# primary objective. Rerun compute_rdkit_stats.py if the parquet changes.
# Order: [logp, tpsa, n_h_donors, n_h_acceptors, n_rot_bonds,
#         frac_csp3, n_aliph_rings, qed, labute_asa]
rdkit_loss:
  min_time: 0.8
  weight:   0.02
  target_mean: [3.0455, 77.0193, 1.4421, 4.9728, 5.2942, 0.3220, 0.9307, 0.5899, 161.6316]
  target_std:  [1.7329, 31.3564, 1.1131, 2.0423, 2.5879, 0.1930, 0.9768, 0.2033,  41.1187]

train:
  seed: 42
  gpus: 4
  n_epochs: 50              # fine-tune from a converged ckpt
  enable_progress_bar: True
  gradient_clip_value: 1.0
  log_freq: 50
  val_freq: 2
  checkpoint_monitor: opt_median_relative_energy
  checkpoint_monitor_mode: min
  checkpoint_every_n_train_steps: 500
  resume_strict: False      # allow missing thermo-head keys in the ckpt

evaluation:
  type: conformers
  max_molecules: 300
  timesteps: *timesteps
  compute_3D_metrics: True
  compute_energy_metrics: True
  compute_stereo_metrics: True
  scale_coords: *scale_coords
  energy_metrics_args:
    model_path: src/megalodon/metrics/aimnet2/cpcm_model/wb97m_cpcms_v2_0.jpt
    batchsize: 100
    opt_metrics: True
    opt_params:
      fmax: 2e-3
      max_nstep: 3000

optimizer:
  type: adamw
  lr: 5.e-5                 # lower than from-scratch: backbone is already fit
  weight_decay: 1.e-12
  amsgrad: True

lr_scheduler:
  type: linear_warmup
  initial_lr: 1.e-6
  final_lr: 5.e-5
  num_warmup_steps: 500     # shorter warmup — backbone already trained
  interval: step
  frequency: 1
